name: byeolsikdang-menu-to-slack

on:
  schedule:
    # 관측상 별식당 메뉴판은 평일 08:54~09:16(KST)에 올라온다(캡션 없는 음식사진은 ~10:50 별도).
    # 그래서 KST 07:09~14:54 를 15분 간격으로 폴링해 게시 직후 아침에 전송한다.
    # 분을 9분 오프셋해 정각 혼잡을 피한다(무료 GitHub cron 은 정각에 지연·드롭이 심함).
    # 09시 이전 전송 보류·주말·공휴일·하루 1건 캡은 check_byeolsikdang.py 가드가 최종 방어선.
    #
    # 09시 이전 슬롯(07:09~08:54)은 SEND_AFTER_HOUR_KST 가드가 "유료 Apify 호출 전에"
    # 보류시키므로 공짜다. 대신 GitHub 이 슬롯을 1시간 안팎 늦춰도(자주 그런다) 그 지연분이
    # 09시 이후로 떨어져 그날 전송을 살리는 '지연 흡수' 쿠션 역할을 한다.
    #
    # ⚠ GitHub cron 은 단독으로 못 믿는다(실측): 2026-07-23(목) 오전 슬롯 09:09·09:24 KST 가
    # 통째로 미발화해 그날 메뉴가 안 나갔다. 같은 시각 카카오봇(menu.yml)은 cron-job.org
    # 외부 트리거(:05/:20/:35/:50) 덕에 정상 동작했다. 전날 07-22 에도 05:54Z 슬롯이 07:26Z 로
    # ~1.5h 밀려 점심 메뉴가 16:26 KST 에 도착했다. → 아래 workflow_dispatch 를 cron-job.org 가
    # 15분마다 때리는 이중화를 함께 운영한다(inputs 없이 dispatch = test 기본값 false = 운영 경로).
    - cron: "9-59/15 22-23 * * 0-4"  # UTC 일–목 22:09–23:54 = KST 월–금 07:09–08:54
    - cron: "9-59/15 0-5 * * 1-5"    # UTC 월–금 00:09–05:54 = KST 월–금 09:09–14:54
  workflow_dispatch:
    inputs:
      test:
        description: "true 이면 캡션 필터를 무시하고 최신 이미지 게시물을 강제 전송 (Slack 배선 점검)"
        required: false
        default: "false"

permissions:
  contents: write           # state/byeolsikdang_last_seen.json 커밋용

concurrency:
  # 카카오 워크플로(menu.yml)와 별도 그룹 — 서로 취소하지 않고 병행 실행.
  # state push 는 아래 rebase-before-push 로 경쟁을 흡수한다.
  group: byeolsikdang-menu
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # 한국 공휴일 판정용(check_menu.rest_day_reason 재사용). 새 공휴일 반영 위해 버전 미고정.
        run: pip install --quiet holidays

      - name: Run byeolsikdang checker
        env:
          # test 모드에서는 유료 Apify 호출을 별도 테스트 토큰(있으면)으로,
          # Slack 은 나와의 대화(SLACK_WEBHOOK_URL_TEST)로 보내 공유 채널(#오늘의점심)
          # 스팸과 운영 크레딧 소모를 피한다. 평시는 운영 시크릿.
          APIFY_TOKEN: ${{ (github.event_name == 'workflow_dispatch' && inputs.test == 'true' && secrets.APIFY_TOKEN_TEST != '') && secrets.APIFY_TOKEN_TEST || secrets.APIFY_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.test == 'true') && secrets.SLACK_WEBHOOK_URL_TEST || secrets.SLACK_WEBHOOK_URL }}
          TEST_MODE: ${{ (github.event_name == 'workflow_dispatch' && inputs.test == 'true') && '1' || '0' }}
        run: python check_byeolsikdang.py

      - name: Commit state if changed
        # 별식당 상태 파일만 stage. 상태는 '실제 전송' 경로에서만 쓰이므로 대개(미게시/보류/
        # test) 파일이 없다 → `git add <없는파일>` 은 pipefail 셸에서 exit 128 로 런을
        # 통째로 실패시킨다. 존재할 때만 add 하고, 스테이징된 변경이 없으면 조용히 skip.
        run: |
          if [ -f state/byeolsikdang_last_seen.json ]; then
            git add state/byeolsikdang_last_seen.json
          fi
          if git diff --cached --quiet; then
            echo "state 변경 없음 — 커밋 skip"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "byeolsikdang: update last_seen ($(date -u +%Y-%m-%dT%H:%MZ))"
            # menu.yml 과 push 가 경쟁하면 pull→push 사이 창에서 non-fast-forward 로
            # 거부될 수 있다. 매 시도마다 재-rebase 후 재-push(경쟁 커밋 흡수). 상태를
            # 잃으면 다음 폴링이 같은 메뉴를 재전송(중복+Apify 크레딧 낭비)하므로 재시도.
            pushed=0
            for i in 1 2 3; do
              if git pull --rebase --autostash && git push; then pushed=1; break; fi
              echo "state push 경쟁/실패 — 재시도 $i" >&2
              sleep 2
            done
            if [ "$pushed" != "1" ]; then
              echo "state push 3회 실패" >&2
              exit 1
            fi
          fi
