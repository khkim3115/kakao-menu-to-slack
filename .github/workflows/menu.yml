name: kakao-menu-to-slack

on:
  schedule:
    # GitHub cron 은 UTC 기준. 한국시간(KST = UTC+9) 오전을 촘촘히 폴링.
    - cron: "*/10 21-23 * * *"   # UTC 21:00–23:59  ≈ KST 06:00–08:59
    - cron: "*/10 0-2 * * *"     # UTC 00:00–02:59  ≈ KST 09:00–11:59
  workflow_dispatch:
    inputs:
      test:
        description: "true 이면 로고/중복 필터를 무시하고 현재 이미지를 강제 전송 (Slack 배선 점검)"
        required: false
        default: "false"

permissions:
  contents: write           # state/last_seen.json 커밋용

concurrency:
  group: kakao-menu         # 동시 실행 방지(push 경쟁 회피)
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run menu checker
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEST_MODE: ${{ (github.event_name == 'workflow_dispatch' && inputs.test == 'true') && '1' || '0' }}
        run: python check_menu.py

      - name: Commit state if changed
        run: |
          if git diff --quiet -- state/; then
            echo "state 변경 없음 — 커밋 skip"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "menu: update last_seen ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
