name: kakao-menu-to-slack

on:
  schedule:
    # GitHub cron 은 UTC 기준이고 무료 플랜에선 지연·드롭이 심하다(특히 정각, UTC 00:00 피크).
    # 그래서 창을 KST 07시대부터 넓게 잡고 분 오프셋(4분)으로 정각 혼잡을 피한다.
    # 09시 이전 전송은 check_menu.py 의 SEND_AFTER_HOUR_KST 가드가 보류한다.
    # KST 월–금만 폴링(주말 제외). KST 07–08시대는 UTC 로 전날 밤이라 요일이 하루 밀린다.
    # 공휴일 스킵은 cron 으로 표현 불가 → check_menu.py 의 주말·공휴일 가드가 최종 방어선.
    - cron: "4-59/10 22-23 * * 0-4"   # UTC 일–목 22:04–23:54 = KST 월–금 07:04–08:54
    - cron: "4-59/10 0-3 * * 1-5"     # UTC 월–금 00:04–03:54 = KST 월–금 09:04–12:54
  workflow_dispatch:
    inputs:
      test:
        description: "true 이면 로고/중복 필터를 무시하고 현재 이미지를 강제 전송 (Slack 배선 점검)"
        required: false
        default: "false"

permissions:
  contents: write           # state/last_seen.json 커밋용

concurrency:
  group: kakao-menu         # 동시 실행 방지(push 경쟁 회피)
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # 한국 공휴일(대체공휴일·임시공휴일 포함) 판정용. 새 공휴일 지정이 데이터에
        # 반영되도록 버전을 고정하지 않고 매 실행 최신을 받는다.
        run: pip install --quiet holidays

      - name: Run menu checker
        env:
          # test 모드에서는 나와의 대화(self-DM)로 가는 SLACK_WEBHOOK_URL_TEST 로 보내
          # 공유 채널(#오늘의점심)에 테스트가 스팸되지 않게 한다. 평시는 운영 웹훅.
          SLACK_WEBHOOK_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.test == 'true') && secrets.SLACK_WEBHOOK_URL_TEST || secrets.SLACK_WEBHOOK_URL }}
          TEST_MODE: ${{ (github.event_name == 'workflow_dispatch' && inputs.test == 'true') && '1' || '0' }}
        run: python check_menu.py

      - name: Commit state if changed
        run: |
          if git diff --quiet -- state/; then
            echo "state 변경 없음 — 커밋 skip"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "menu: update last_seen ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
